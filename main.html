<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ruleta Configurable</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; margin-bottom: 20px; }
    td, th { border: 1px solid #ccc; padding: 5px 10px; }
    input { width: 60px; }
    .hidden { display: none; }
    .wheel { display: flex; flex-wrap: wrap; max-width: 400px; }
    .slot { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #000; margin: 2px; }
    button { margin-top: 10px; }
  </style>
</head>
<body>

<h2>Pantalla 1: Configuración</h2>
<table id="configTable">
  <tr><th>Número</th><th>Posiciones</th></tr>
</table>
<button onclick="generarRuleta()">Generar Ruleta</button>

<div id="pantalla2" class="hidden">
  <h2>Pantalla 2: Ruleta</h2>
  <div id="ruleta" class="wheel"></div>
  <button onclick="tirarRuleta()">Girar</button>
  <h3 id="resultado"></h3>
</div>

<script>
  const tabla = document.getElementById('configTable');
  const ruletaDiv = document.getElementById('ruleta');
  let ruletaArray = [];

  // Crear tabla 0-36
  for (let i = 0; i <= 36; i++) {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${i}</td>
      <td><input type="number" min="0" value="0" id="num-${i}"></td>
    `;
    tabla.appendChild(row);
  }

  function generarRuleta() {
    ruletaArray = [];
    ruletaDiv.innerHTML = '';

    for (let i = 0; i <= 36; i++) {
      const valor = parseInt(document.getElementById(`num-${i}`).value) || 0;

      for (let j = 0; j < valor; j++) {
        ruletaArray.push(i);
      }
    }

    if (ruletaArray.length === 0) {
      alert('No hay números en la ruleta');
      return;
    }

    // Dibujar ruleta
    ruletaArray.forEach(num => {
      const div = document.createElement('div');
      div.className = 'slot';
      div.textContent = num;
      ruletaDiv.appendChild(div);
    });

    document.getElementById('pantalla2').classList.remove('hidden');
  }

  function tirarRuleta() {
    const randomIndex = Math.floor(Math.random() * ruletaArray.length);
    const resultado = ruletaArray[randomIndex];
    document.getElementById('resultado').textContent = 'Resultado: ' + resultado;
  }
</script>

</body>
</html>
