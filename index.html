<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; text-align: center; }
.hidden { display: none; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

/* RUEDA MUCHO MÁS PEQUEÑA */
.wheel-container {
  width: 220px;
  height: 220px;
  margin: 20px auto;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 4px solid #000;
}

/* CENTRO */
.wheel::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 12px;
  background: black;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.slice {
  position: absolute;
  width: 50%;
  height: 50%;
  top: 50%;
  left: 50%;
  transform-origin: 0% 0%;
}

.slice span {
  position: absolute;
  top: 28%;
  left: 60%;
  transform-origin: center;
  font-size: 9px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 3px black;
  pointer-events: none;
}

.red { background: #c62828; }
.black { background: #000; }
.green { background: #2e7d32; }

.highlight {
  box-shadow: 0 0 8px gold, 0 0 15px gold;
  z-index: 2;
}

button {
  padding: 10px;
  margin-top: 15px;
}

</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<button onclick="generar()">Generar Ruleta</button>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="wheel-container">
  <div id="wheel" class="wheel"></div>
</div>

<!-- BOTÓN FUERA DE LA RUEDA -->
<div>
  <button onclick="girar()">Girar</button>
</div>

<h3 id="resultado"></h3>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');
let slots = [];

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="0" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {
  slots = [];
  wheel.innerHTML = '';

  let suma = 0;

  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    // SOLO UN 0 (regla de ruleta)
    if (i === 0 && count > 1) count = 1;

    suma += count;

    for (let j = 0; j < count; j++) {
      slots.push(i);
    }
  }

  if (suma === 0) {
    alert('La suma no puede ser 0');
    return;
  }

  if (suma > 36) {
    alert('La suma no puede superar 36');
    return;
  }

  let finalSlots = [];

  while (finalSlots.length < 36) {
    finalSlots.push(...slots);
  }

  finalSlots = finalSlots.slice(0, 36);

  finalSlots.sort(() => Math.random() - 0.5);

  window.finalSlots = finalSlots;

  dibujar(finalSlots);

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(data) {
  const angle = 360 / 36;

  let toggle = false; // alternar rojo/negro

  data.forEach((num, i) => {
    const slice = document.createElement('div');
    slice.className = 'slice';

    if (num === 0) {
      slice.classList.add('green');
    } else {
      toggle = !toggle;
      slice.classList.add(toggle ? 'red' : 'black');
    }

    slice.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
    slice.dataset.num = num;

    const label = document.createElement('span');
    label.textContent = num;

    label.style.transform = `
      skewY(-${90 - angle}deg)
      rotate(${angle / 2}deg)
    `;

    slice.appendChild(label);
    wheel.appendChild(slice);
  });
}

window.girar = function() {
  const data = window.finalSlots;
  const result = data[Math.floor(Math.random() * data.length)];

  document.getElementById('resultado').textContent = 'Resultado: ' + result;

  document.querySelectorAll('.slice').forEach(s => s.classList.remove('highlight'));

  document.querySelectorAll(`.slice[data-num='${result}']`).forEach(s => {
    s.classList.add('highlight');
  });
}

});
</script>

</body>
</html>
