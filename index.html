<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta precisa</title>
<style>
  body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  .contenedor {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 40px auto;
  }

  canvas {
    border-radius: 50%;
  }

  .bola {
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  #resultado {
    margin-top: 20px;
    font-size: 28px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Ruleta 🎡</h1>

<div class="contenedor">
  <canvas id="ruleta" width="400" height="400"></canvas>
  <div class="bola" id="bola"></div>
</div>

<button onclick="girar()">Girar</button>

<div id="resultado">Resultado: -</div>

<script>
const canvas = document.getElementById("ruleta");
const ctx = canvas.getContext("2d");

const numeros = [
  0, 32, 15, 19, 4, 21, 2, 25,
  17, 34, 6, 27, 13, 36, 11, 30,
  8, 23, 10, 5, 24, 16, 33, 1,
  20, 14, 31, 9, 22, 18, 29, 7,
  28, 12, 35, 3, 26
];

const total = numeros.length;
const anguloSegmento = (2 * Math.PI) / total;

function dibujarRuleta() {
  for (let i = 0; i < total; i++) {
    const anguloInicio = i * anguloSegmento;
    const anguloFin = anguloInicio + anguloSegmento;

    ctx.beginPath();
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, anguloInicio, anguloFin);
    ctx.fillStyle = i % 2 === 0 ? "#16a34a" : "#dc2626";
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(anguloInicio + anguloSegmento / 2);
    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.fillText(numeros[i], 140, 5);
    ctx.restore();
  }
}

dibujarRuleta();

let anguloRuleta = 0;

function girar() {
  const vueltas = Math.random() * 5 + 5;
  const anguloFinalRuleta = anguloRuleta + vueltas * 360;

  const duracion = 3000;
  const inicio = performance.now();

  function animar(tiempo) {
    const progreso = (tiempo - inicio) / duracion;

    if (progreso < 1) {
      anguloRuleta = anguloFinalRuleta * easeOut(progreso);

      canvas.style.transform = `rotate(${anguloRuleta}deg)`;

      requestAnimationFrame(animar);
    } else {
      anguloRuleta = anguloFinalRuleta % 360;
      canvas.style.transform = `rotate(${anguloRuleta}deg)`;

      calcularResultado();
    }
  }

  requestAnimationFrame(animar);
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

// 🔥 AQUÍ ESTÁ LA CLAVE REAL
function calcularResultado() {
  const totalNumeros = numeros.length;
  const anguloPorSegmento = 360 / totalNumeros;

  // La bola está fija arriba → usamos el ángulo de la ruleta invertido
  const anguloNormalizado = (360 - anguloRuleta % 360) % 360;

  // Ajuste fino para centrar bien el segmento
  const offset = anguloPorSegmento / 2;

  const index = Math.floor((anguloNormalizado + offset) / anguloPorSegmento) % totalNumeros;

  const numeroGanador = numeros[index];

  document.getElementById("resultado").innerText = "Resultado: " + numeroGanador;
}
</script>

</body>
</html>
