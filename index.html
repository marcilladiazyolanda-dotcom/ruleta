<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

h2, h3 { text-align: center; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

/* LAYOUT PANTALLA 2 */
.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  margin-top: 20px;
}

/* RUEDA */
.wheel-container {
  width: 220px;
  height: 220px;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 4px solid #000;
}

.wheel::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 12px;
  background: black;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* PANEL DERECHO */
.panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">

  <!-- IZQUIERDA -->
  <div class="wheel-container">
    <div id="wheel" class="wheel"></div>
  </div>

  <!-- DERECHA -->
  <div class="panel">
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="0" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {
  wheel.innerHTML = '';

  let config = [];
  let suma = 0;

  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (i === 0 && count > 1) count = 1;

    if (count > 0) {
      config.push({ num: i, weight: count });
      suma += count;
    }
  }

  if (suma === 0) {
    alert('La suma no puede ser 0');
    return;
  }

  if (suma > 36) {
    alert('La suma no puede superar 36');
    return;
  }

  window.config = config;

  dibujar(config, suma);

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

// 👇 AQUÍ ESTÁ TU FUNCIÓN YA INTEGRADA
function dibujar(config, total) {
  let currentPercent = 0;
  let gradient = "";
  let toggle = false;

  config.forEach(item => {
    let percent = (item.weight / total) * 100;

    let color;

    if (item.num === 0) {
      color = "#2e7d32";
    } else {
      toggle = !toggle;
      color = toggle ? "#c62828" : "#000";
    }

    gradient += `${color} ${currentPercent}% ${currentPercent + percent}%,`;

    currentPercent += percent;
  });

  gradient = gradient.slice(0, -1);

  wheel.style.background = `conic-gradient(${gradient})`;

  // LIMPIAR Y AÑADIR NÚMEROS
  wheel.innerHTML = "";

  let currentAngle = 0;

  config.forEach(item => {
    const angle = (item.weight / total) * 360;

    const label = document.createElement("div");
    label.textContent = item.num;

    label.style.position = "absolute";
    label.style.left = "50%";
    label.style.top = "50%";
    label.style.transformOrigin = "0 0";
    label.style.fontSize = "10px";
    label.style.color = "white";
    label.style.fontWeight = "bold";

    label.style.transform = `
      rotate(${currentAngle + angle / 2}deg)
      translate(80px)
      rotate(90deg)
    `;

    wheel.appendChild(label);

    currentAngle += angle;
  });
}

window.girar = function() {
  const config = window.config;

  const total = config.reduce((acc, c) => acc + c.weight, 0);
  let rand = Math.random() * total;

  let acumulado = 0;
  let result = null;

  for (let item of config) {
    acumulado += item.weight;
    if (rand <= acumulado) {
      result = item.num;
      break;
    }
  }

  document.getElementById('resultado').textContent = 'Resultado: ' + result;
}

});
</script>

</body>
</html>
