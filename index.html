<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta PRO</title>

<style>
body { font-family: Arial; text-align: center; background:#ddd; }
.hidden { display:none; }

.layout {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.wheel-wrapper {
  width:420px;
  height:420px;
  position:relative;
}

#wheelSVG {
  width:100%;
  height:100%;
  transition: transform 4s cubic-bezier(0.15,0.7,0.25,1);
}

.ball {
  position:absolute;
  width:12px;
  height:12px;
  background:white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%) rotate(0deg) translate(180px);
  box-shadow:0 0 6px black;
}

table { margin:auto; border-collapse: collapse; }
td { border:1px solid #999; padding:5px; }
input { width:50px; }
button { padding:10px; margin-top:10px; }

</style>
</head>

<body>

<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<button onclick="generar()">Generar Ruleta</button>
</div>

<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">
  <div class="wheel-wrapper">
    <svg id="wheelSVG" viewBox="0 0 420 420"></svg>
    <div id="ball" class="ball"></div>
  </div>

  <div>
    <button onclick="girar()">Girar</button>
    <button onclick="volver()">← Volver</button>
    <h3 id="resultado"></h3>
  </div>
</div>
</div>

<script>
const tabla = document.getElementById('tabla');
const svg = document.getElementById('wheelSVG');
const ball = document.getElementById('ball');

let wheelRotation = 0;
let ballRotation = 0;

// TABLA
for(let i=0;i<=36;i++){
  let row=document.createElement('tr');
  row.innerHTML=`<td>${i}</td><td><input value="1" id="n-${i}"></td>`;
  tabla.appendChild(row);
}

function volver(){
  pantalla1.classList.remove('hidden');
  pantalla2.classList.add('hidden');
}

// GENERAR
function generar(){

  svg.innerHTML="";

  let bloques=[];

  for(let i=0;i<=36;i++){
    let val=parseInt(document.getElementById(`n-${i}`).value)||0;
    if(i===0) val=1;
    if(val>0) bloques.push({num:i,size:val});
  }

  let otros=bloques.filter(b=>b.num!==0);
  otros.sort(()=>Math.random()-0.5);

  bloques=[{num:0,size:1},...otros];
  window.bloques=bloques;

  dibujar(bloques);

  window.bolsa=[];
  bloques.forEach(b=>{
    for(let i=0;i<b.size;i++) window.bolsa.push(b);
  });

  pantalla1.classList.add('hidden');
  pantalla2.classList.remove('hidden');
  // CALCULAR ANGULOS REALES
let total = bloques.reduce((a,b)=>a+b.size,0);
let current = 0;

bloques.forEach(b=>{
  let angle = (b.size / total) * 360;
  b.start = current;
  b.end = current + angle;
  current += angle;
});
}

// DIBUJAR
function dibujar(bloques){

  const cx=210, cy=210;
  const rOuter=200;
  const rMid=150;
  const rInner=110;

  let total=bloques.reduce((a,b)=>a+b.size,0);
  let angleStart=0;
  let toggle=true;

  let separadoresInternos=[];

  // DEGRADADO ORO
  let defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
  defs.innerHTML=`
    <radialGradient id="gold">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8c6b00"/>
    </radialGradient>
  `;
  svg.appendChild(defs);

  bloques.forEach(b=>{

    let angle=(b.size/total)*360;
    let start=angleStart;
    let end=start+angle;

    let color;
    if(b.num===0){
      color="#2e7d32";
      toggle=true;
    } else {
      color=toggle?"#c62828":"#000";
      toggle=!toggle;
    }

    let path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",arc(cx,cy,rOuter,start,end,rMid));
    path.setAttribute("fill",color);
    svg.appendChild(path);

    svg.appendChild(createLine(cx,cy,start,rMid,rOuter,"silver",2));
    separadoresInternos.push(start);

    let mid=start+angle/2;
    b.mid=mid;

    let tx=cx+Math.cos((mid-90)*Math.PI/180)*175;
    let ty=cy+Math.sin((mid-90)*Math.PI/180)*175;

    let text=document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x",tx);
    text.setAttribute("y",ty);
    text.setAttribute("fill","white");
    text.setAttribute("font-size","14");
    text.setAttribute("text-anchor","middle");
    text.textContent=b.num;

    svg.appendChild(text);

    angleStart=end;
  });

  // ANILLO NEGRO
  let ring=document.createElementNS("http://www.w3.org/2000/svg","circle");
  ring.setAttribute("cx",cx);
  ring.setAttribute("cy",cy);
  ring.setAttribute("r",rMid);
  ring.setAttribute("fill","black");
  svg.appendChild(ring);

  // separadores internos encima
  separadoresInternos.forEach(a=>{
    svg.appendChild(createLine(cx,cy,a,rInner,rMid,"silver",1));
  });

  // 🟡 CENTRO
  let center=document.createElementNS("http://www.w3.org/2000/svg","circle");
  center.setAttribute("cx",cx);
  center.setAttribute("cy",cy);
  center.setAttribute("r",80);
  center.setAttribute("fill","url(#gold)");
  svg.appendChild(center);

  // 🔥 BRAZOS (LO NUEVO)
  for(let i=0;i<4;i++){
    let angle=i*90;

    let group=document.createElementNS("http://www.w3.org/2000/svg","g");
    group.setAttribute("transform",`rotate(${angle} ${cx} ${cy})`);

    // barra
    let rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("x",cx-3);
    rect.setAttribute("y",cy-70);
    rect.setAttribute("width",6);
    rect.setAttribute("height",50);
    rect.setAttribute("fill","#c9a227");

    // bola final
    let circle=document.createElementNS("http://www.w3.org/2000/svg","circle");
    circle.setAttribute("cx",cx);
    circle.setAttribute("cy",cy-75);
    circle.setAttribute("r",6);
    circle.setAttribute("fill","#e6c65c");

    group.appendChild(rect);
    group.appendChild(circle);
    svg.appendChild(group);
  }

  // núcleo
  let hub=document.createElementNS("http://www.w3.org/2000/svg","circle");
  hub.setAttribute("cx",cx);
  hub.setAttribute("cy",cy);
  hub.setAttribute("r",12);
  hub.setAttribute("fill","#e6c65c");
  svg.appendChild(hub);
}

// ARCOS
function arc(cx,cy,rOuter,start,end,rInner){
  let s=(start-90)*Math.PI/180;
  let e=(end-90)*Math.PI/180;

  let x1=cx+rOuter*Math.cos(s);
  let y1=cy+rOuter*Math.sin(s);

  let x2=cx+rOuter*Math.cos(e);
  let y2=cy+rOuter*Math.sin(e);

  let x3=cx+rInner*Math.cos(e);
  let y3=cy+rInner*Math.sin(e);

  let x4=cx+rInner*Math.cos(s);
  let y4=cy+rInner*Math.sin(s);

  return `M ${x1} ${y1}
          A ${rOuter} ${rOuter} 0 0 1 ${x2} ${y2}
          L ${x3} ${y3}
          A ${rInner} ${rInner} 0 0 0 ${x4} ${y4}
          Z`;
}

// LINEAS
function createLine(cx,cy,angle,r1,r2,color,w){
  let rad=(angle-90)*Math.PI/180;

  let line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",cx+Math.cos(rad)*r1);
  line.setAttribute("y1",cy+Math.sin(rad)*r1);
  line.setAttribute("x2",cx+Math.cos(rad)*r2);
  line.setAttribute("y2",cy+Math.sin(rad)*r2);
  line.setAttribute("stroke",color);
  line.setAttribute("stroke-width",w);

  return line;
}

// GIRAR
function girar(){

  // giro libre de la bola
  let spin = 360 * 5 + Math.random() * 360;

  ballRotation += spin;

  ball.style.transition = "transform 3s ease-out";
  ball.style.transform = `
    translate(-50%,-50%)
    rotate(${ballRotation}deg)
    translate(180px)
  `;

  // calcular resultado cuando termina
  setTimeout(()=>{

    // ángulo final de la bola
    let finalAngle = (ballRotation % 360 + 360) % 360;

    // compensar giro de la ruleta
    let relativeAngle = (finalAngle - wheelRotation) % 360;
    if (relativeAngle < 0) relativeAngle += 360;

    // buscar segmento correcto
    let resultadoFinal = window.bloques.find(b =>
      relativeAngle >= b.start && relativeAngle < b.end
    );

    document.getElementById('resultado').innerText =
      "Resultado: " + resultadoFinal.num;

  }, 3000);
}
</script>

</body>
</html>
