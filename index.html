<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta precisa PRO</title>
<style>
  body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  .contenedor {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 40px auto;
  }

  canvas {
    border-radius: 50%;
  }

  .bola {
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  #resultado {
    margin-top: 20px;
    font-size: 28px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Ruleta 🎯</h1>

<div class="contenedor">
  <canvas id="ruleta" width="400" height="400"></canvas>
  <div class="bola"></div>
</div>

<button onclick="girar()">Girar</button>

<div id="resultado">Resultado: -</div>

<script>
const canvas = document.getElementById("ruleta");
const ctx = canvas.getContext("2d");

const numeros = [
  0, 32, 15, 19, 4, 21, 2, 25,
  17, 34, 6, 27, 13, 36, 11, 30,
  8, 23, 10, 5, 24, 16, 33, 1,
  20, 14, 31, 9, 22, 18, 29, 7,
  28, 12, 35, 3, 26
];

const total = numeros.length;
const anguloSegmento = (2 * Math.PI) / total;

// 🎨 DIBUJAR RULETA
function dibujarRuleta() {

  // SEGMENTOS
  for (let i = 0; i < total; i++) {
    const inicio = i * anguloSegmento;
    const fin = inicio + anguloSegmento;

    ctx.beginPath();
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, inicio, fin);
    ctx.closePath();

    // colores
    if (numeros[i] === 0) {
      ctx.fillStyle = "#16a34a";
    } else {
      ctx.fillStyle = i % 2 === 0 ? "#dc2626" : "#000000";
    }

    ctx.fill();

    // TEXTO centrado en el segmento
    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(inicio + anguloSegmento / 2);
    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.fillText(numeros[i], 140, 5);
    ctx.restore();
  }

  // 🔥 SEPARADORES (CORRECTOS EN LOS BORDES)
  ctx.strokeStyle = "#e5e7eb";
  ctx.lineWidth = 2;

  for (let i = 0; i < total; i++) {
    const angulo = i * anguloSegmento;

    const x = 200 + Math.cos(angulo) * 200;
    const y = 200 + Math.sin(angulo) * 200;

    ctx.beginPath();
    ctx.moveTo(200, 200);
    ctx.lineTo(x, y);
    ctx.stroke();
  }
}

dibujarRuleta();

let anguloRuleta = 0;

// 🎯 GIRAR
function girar() {
  const vueltas = Math.random() * 5 + 5;
  const destino = anguloRuleta + vueltas * 360;

  const duracion = 3000;
  const inicio = performance.now();

  function animar(tiempo) {
    const progreso = (tiempo - inicio) / duracion;

    if (progreso < 1) {
      anguloRuleta = destino * easeOut(progreso);
      canvas.style.transform = `rotate(${anguloRuleta}deg)`;
      requestAnimationFrame(animar);
    } else {
      anguloRuleta = destino % 360;
      canvas.style.transform = `rotate(${anguloRuleta}deg)`;
      calcularResultado();
    }
  }

  requestAnimationFrame(animar);
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

// 🧠 RESULTADO EXACTO
function calcularResultado() {
  const anguloPorSegmento = 360 / total;

  const anguloNormalizado = (360 - anguloRuleta % 360) % 360;

  const offset = anguloPorSegmento / 2;

  const index = Math.floor((anguloNormalizado + offset) / anguloPorSegmento) % total;

  const numeroGanador = numeros[index];

  document.getElementById("resultado").innerText = "Resultado: " + numeroGanador;
}
</script>

</body>
</html>
