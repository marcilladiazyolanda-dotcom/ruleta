<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>
<style>
body { font-family: Arial; text-align: center; }

.hidden { display: none; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

.wheel-container {
  position: relative;
  width: 400px;
  height: 400px;
  margin: 40px auto;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 6px solid #000;
}

.slice {
  position: absolute;
  width: 50%;
  height: 50%;
  top: 50%;
  left: 50%;
  transform-origin: 0% 0%;
}

.slice span {
  position: absolute;
  left: 100%;
  top: 0;
  transform: rotate(90deg);
  transform-origin: 0 0;
  font-size: 10px;
  color: white;
}

.red { background: #c62828; }
.black { background: #000; }
.green { background: #2e7d32; }

.highlight { outline: 3px solid gold; }

button { padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<button onclick="generar()">Generar Ruleta</button>
</div>

<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>
<div class="wheel-container">
<div id="wheel" class="wheel"></div>
</div>
<button onclick="girar()">Girar</button>
<h3 id="resultado"></h3>
</div>

<script>
const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');
let slots = [];

// tabla 0-36
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="0" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

function generar() {
  slots = [];
  wheel.innerHTML = '';

  let suma = 0;

  // construir slots según inputs
  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (count < 0) count = 0; // seguridad

    suma += count;

    for (let j = 0; j < count; j++) {
      slots.push(i);
    }
  }

  // VALIDACIÓN CLAVE
  if (suma === 0) {
    alert('La suma no puede ser 0');
    return;
  }

  if (suma > 36) {
    alert('La suma total no puede superar 36');
    return;
  }

  // NORMALIZAR a 36 posiciones manteniendo proporciones
  let finalSlots = [];

  while (finalSlots.length < 36) {
    finalSlots.push(...slots);
  }

  finalSlots = finalSlots.slice(0, 36);

  dibujar(finalSlots);

  window.finalSlots = finalSlots;

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}`).value) || 0;

    for (let j = 0; j < count; j++) {
      slots.push(i);
    }
  }

  if (slots.length === 0) {
    alert('No hay valores');
    return;
  }

  // NORMALIZAR a 36 posiciones
  let finalSlots = [];

  while (finalSlots.length < 36) {
    finalSlots.push(...slots);
  }

  finalSlots = finalSlots.slice(0, 36);

  dibujar(finalSlots);

  window.finalSlots = finalSlots;

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(data) {
  const angle = 360 / 36;

  data.forEach((num, i) => {
    const slice = document.createElement('div');
    slice.className = 'slice';

    let color = 'black';
    if (num === 0) color = 'green';
    else if (num % 2 === 0) color = 'black';
    else color = 'red';

    slice.classList.add(color);

    // posicion geométrica
    slice.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
    slice.dataset.num = num;

    // CONTENIDO VISUAL DEL NÚMERO
    const label = document.createElement('div');
    label.textContent = num;

    label.style.position = 'absolute';
    label.style.left = '65%';
    label.style.top = '10%';
    label.style.transform = `rotate(${angle / 2}deg) skewY(-${90 - angle}deg)`;
    label.style.fontSize = '12px';
    label.style.fontWeight = 'bold';
    label.style.color = 'white';
    label.style.pointerEvents = 'none';

    slice.appendChild(label);
    wheel.appendChild(slice);
  });
}deg) skewY(${90 - angle}deg)`;
    slice.dataset.num = num;

    const label = document.createElement('span');
    label.textContent = num;

    slice.appendChild(label);
    wheel.appendChild(slice);
  });
}

function girar() {
  const data = window.finalSlots;
  const result = data[Math.floor(Math.random() * data.length)];

  document.getElementById('resultado').textContent = 'Resultado: ' + result;

  document.querySelectorAll('.slice').forEach(s => s.classList.remove('highlight'));

  document.querySelectorAll(`.slice[data-num='${result}']`).forEach(s => {
    s.classList.add('highlight');
  });
}
</script>

</body>
</html>
