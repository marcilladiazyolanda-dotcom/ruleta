<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

h2, h3 { text-align: center; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

/* LAYOUT */
.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

/* RULETA */
.wheel-container {
  width: 260px;
  height: 260px;
  position: relative;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 4px solid black;
  overflow: hidden;
}

/* SEGMENTOS */
.slice {
  position: absolute;
  width: 50%;
  height: 50%;
  top: 50%;
  left: 50%;
  transform-origin: 0% 0%;
}

.slice span {
  position: absolute;
  top: 10px;
  left: 10px;
  transform-origin: center;
  color: white;
  font-size: 10px;
  font-weight: bold;
}

.red { background: #c62828; }
.black { background: #000; }
.green { background: #2e7d32; }

.panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">

  <div class="wheel-container">
    <div id="wheel" class="wheel"></div>
  </div>

  <div class="panel">
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="1" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {

  wheel.innerHTML = '';

  let numeros = [];

  // meter números según peso
  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (i === 0 && count > 1) count = 1;

    for (let j = 0; j < count; j++) {
      numeros.push(i);
    }
  }

  if (numeros.length === 0) {
    alert("No hay números");
    return;
  }

  // completar hasta 37 slots
  while (numeros.length < 37) {
    numeros = numeros.concat(numeros);
  }

  numeros = numeros.slice(0, 37);

  // separar el 0
  const otros = numeros.filter(n => n !== 0);

  // mezclar
  otros.sort(() => Math.random() - 0.5);

  // reconstruir (0 primero)
  numeros = [0, ...otros.slice(0, 36)];

  dibujar(numeros);

  window.numeros = numeros;

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(numeros) {

  const total = numeros.length;
  const angle = 360 / total;

  let toggle = true;

  numeros.forEach((num, i) => {

    const slice = document.createElement('div');
    slice.className = 'slice';

    let color;

    if (num === 0) {
      color = 'green';
      toggle = true;
    } else {
      color = toggle ? 'red' : 'black';
      toggle = !toggle;
    }

    slice.classList.add(color);

    slice.style.transform = `
      rotate(${i * angle}deg)
      skewY(${90 - angle}deg)
    `;

    const label = document.createElement('span');
    label.textContent = num;

    label.style.transform = `
      skewY(-${90 - angle}deg)
      rotate(${angle / 2}deg)
    `;

    slice.appendChild(label);
    wheel.appendChild(slice);
  });
}

window.girar = function() {
  const numeros = window.numeros;
  const result = numeros[Math.floor(Math.random() * numeros.length)];
  document.getElementById('resultado').textContent = 'Resultado: ' + result;
}

});
</script>

</body>
</html>
