<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta PRO</title>

<style>
body { font-family: Arial; text-align: center; }
.hidden { display:none; }

.layout{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  max-width:600px;
  margin:auto;
}

.wheel-wrapper{
  width:320px;
  height:320px;
  position:relative;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  border:6px solid black;
  position:absolute;
  transform-origin:50% 50%;
  transition: transform 4s cubic-bezier(0.15,0.7,0.25,1);
}

.labels{
  position:absolute;
  inset:0;
}

.label{
  position:absolute;
  left:50%;
  top:50%;
  width:28px;
  margin-left:-14px;
  text-align:center;
  font-weight:bold;
  color:white;
  text-shadow:0 0 4px black;
  font-size:12px;
}

.ball{
  position:absolute;
  width:14px;
  height:14px;
  background:white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%) rotate(0deg) translate(130px);
  box-shadow:0 0 6px black;
  z-index:10;
}

table{ margin:auto; }
input{ width:60px; }
</style>
</head>

<body>

<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<button onclick="generar()">Generar Ruleta</button>
</div>

<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">
  <div class="wheel-wrapper">
    <div id="wheel" class="wheel">
      <div id="labels" class="labels"></div>
    </div>
    <div id="ball" class="ball"></div>
  </div>

  <div>
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>
</div>
</div>

<script>
const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');
const labels = document.getElementById('labels');
const ball = document.getElementById('ball');

let ballRotation = 0;
let wheelRotation = 0;

const R_LABEL = 110;

// TABLA
for(let i=0;i<=36;i++){
  const row=document.createElement('tr');
  row.innerHTML=`
    <td>${i}</td>
    <td><input type="number" value="1" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

function generar(){

  labels.innerHTML="";
  let bloques=[];

  for(let i=0;i<=36;i++){
    let count=parseInt(document.getElementById(`n-${i}`).value)||0;
    if(i===0) count=1;
    if(count>0) bloques.push({num:i,size:count});
  }

  let otros=bloques.filter(b=>b.num!==0);
  otros.sort(()=>Math.random()-0.5);

  bloques=[{num:0,size:1},...otros];
  window.bloques=bloques;

  dibujar(bloques);

  // bolsa de probabilidad
  window.bolsa=[];
  bloques.forEach(b=>{
    for(let i=0;i<b.size;i++){
      window.bolsa.push(b);
    }
  });

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(bloques){

  let total=bloques.reduce((a,b)=>a+b.size,0);
  let current=0;
  let gradient="";
  let toggle=true;

  bloques.forEach(b=>{

    let angle=(b.size/total)*360;

    let color;
    if(b.num===0){
      color="#2e7d32";
      toggle=true;
    } else {
      color=toggle?"#c62828":"#000";
      toggle=!toggle;
    }

    gradient+=`${color} ${current}deg ${current+angle}deg,`;

    let mid=current+angle/2;
    b.mid=mid;

    let label=document.createElement("div");
    label.className="label";
    label.textContent=b.num;

    label.style.transform=`
      rotate(${mid-90}deg)
      translate(${R_LABEL}px)
      rotate(${90-mid}deg)
    `;

    labels.appendChild(label);

    current+=angle;
  });

  wheel.style.background=`conic-gradient(${gradient.slice(0,-1)})`;
}

function girar(){

  const bloques = window.bloques;
  const elegido = window.bolsa[Math.floor(Math.random()*window.bolsa.length)];

  // 🎯 ángulo exacto del segmento
  const target = elegido.mid - 90;

  // 🎡 ruleta
  const impulso=180+Math.random()*120;
  wheelRotation-=impulso;
  wheel.style.transform=`rotate(${wheelRotation}deg)`;

  // ⚪ bola (exacta)
  const vueltas=6;
  const radio=130;

  ballRotation += vueltas*360 + target - wheelRotation;

  ball.style.transition="transform 2.4s cubic-bezier(0.2,0.9,0.3,1)";
  ball.style.transform=`
    translate(-50%,-50%)
    rotate(${ballRotation}deg)
    translate(${radio}px)
  `;

  // resultado SIEMPRE correcto
  document.getElementById('resultado').innerText = "Resultado: " + elegido.num;
}
</script>

</body>
</html>
