<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Casino</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ddd;
}

.hidden { display:none; }

.layout {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.wheel-wrapper {
  width:400px;
  height:400px;
  position:relative;
}

#wheelSVG {
  width:100%;
  height:100%;
  transition: transform 4s cubic-bezier(0.15,0.7,0.25,1);
  transform-origin: 50% 50%;
}

.ball {
  position:absolute;
  width:12px;
  height:12px;
  background:white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%) rotate(0deg) translate(170px);
  box-shadow:0 0 6px black;
}

table {
  margin:auto;
  border-collapse: collapse;
}

td {
  border:1px solid #999;
  padding:5px;
}

input {
  width:50px;
}

button {
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="pantalla1">
  <h2>Configuración</h2>
  <table id="tabla"></table>
  <button onclick="generar()">Generar Ruleta</button>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="hidden">
  <h2>Ruleta</h2>

  <div class="layout">
    <div class="wheel-wrapper">
      <svg id="wheelSVG" viewBox="0 0 400 400"></svg>
      <div id="ball" class="ball"></div>
    </div>

    <div>
      <button onclick="girar()">Girar</button>
      <button onclick="volver()">← Volver</button>
      <h3 id="resultado"></h3>
    </div>
  </div>
</div>

<script>
const tabla = document.getElementById('tabla');
const svg = document.getElementById('wheelSVG');
const ball = document.getElementById('ball');
const pantalla1 = document.getElementById('pantalla1');
const pantalla2 = document.getElementById('pantalla2');
const resultado = document.getElementById('resultado');

let wheelRotation = 0;
let ballRotation = 0;

// 🔥 CREAR TABLA 0–36 (CORRECTO)
for (let i = 0; i <= 36; i++) {
  let row = document.createElement('tr');

  let td1 = document.createElement('td');
  td1.textContent = i;

  let td2 = document.createElement('td');
  let input = document.createElement('input');
  input.type = "number";
  input.value = 1;
  input.id = "n-" + i;

  td2.appendChild(input);

  row.appendChild(td1);
  row.appendChild(td2);

  tabla.appendChild(row);
}

// VOLVER
function volver() {
  pantalla1.classList.remove('hidden');
  pantalla2.classList.add('hidden');
}

// GENERAR
function generar() {

  svg.innerHTML = "";

  let bloques = [];

  for (let i = 0; i <= 36; i++) {
    let val = parseInt(document.getElementById(`n-${i}`).value) || 0;
    if (i === 0) val = 1;
    if (val > 0) bloques.push({ num: i, size: val });
  }

  let otros = bloques.filter(b => b.num !== 0);
  otros.sort(() => Math.random() - 0.5);

  bloques = [{ num: 0, size: 1 }, ...otros];
  window.bloques = bloques;

  dibujarSVG(bloques);

  window.bolsa = [];
  bloques.forEach(b => {
    for (let i = 0; i < b.size; i++) window.bolsa.push(b);
  });

  pantalla1.classList.add('hidden');
  pantalla2.classList.remove('hidden');
}

// DIBUJAR RULETA SVG
function dibujarSVG(bloques) {

  let total = bloques.reduce((a, b) => a + b.size, 0);
  let angleStart = 0;

  const cx = 200, cy = 200;
  const rOuter = 190;
  const rInner = 130;

  let toggle = true;

  bloques.forEach(b => {

    let angle = (b.size / total) * 360;
    let start = angleStart;
    let end = start + angle;

    let color;
    if (b.num === 0) {
      color = "#2e7d32";
      toggle = true;
    } else {
      color = toggle ? "#c62828" : "#000";
      toggle = !toggle;
    }

    let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", describeArc(cx, cy, rOuter, start, end, rInner));
    path.setAttribute("fill", color);
    svg.appendChild(path);

    // 🔩 separador en borde REAL
    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    let rad = (start - 90) * Math.PI / 180;

    line.setAttribute("x1", cx + Math.cos(rad) * rInner);
    line.setAttribute("y1", cy + Math.sin(rad) * rInner);
    line.setAttribute("x2", cx + Math.cos(rad) * rOuter);
    line.setAttribute("y2", cy + Math.sin(rad) * rOuter);
    line.setAttribute("stroke", "silver");
    line.setAttribute("stroke-width", "2");

    svg.appendChild(line);

    // número
    let mid = start + angle / 2;
    b.mid = mid;

    let tx = cx + Math.cos((mid - 90) * Math.PI / 180) * 160;
    let ty = cy + Math.sin((mid - 90) * Math.PI / 180) * 160;

    let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", tx);
    text.setAttribute("y", ty);
    text.setAttribute("fill", "white");
    text.setAttribute("font-size", "14");
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("dominant-baseline", "middle");
    text.textContent = b.num;

    svg.appendChild(text);

    angleStart = end;
  });
}

// ARCO
function describeArc(cx, cy, rOuter, start, end, rInner) {

  let startRad = (start - 90) * Math.PI / 180;
  let endRad = (end - 90) * Math.PI / 180;

  let x1 = cx + rOuter * Math.cos(startRad);
  let y1 = cy + rOuter * Math.sin(startRad);

  let x2 = cx + rOuter * Math.cos(endRad);
  let y2 = cy + rOuter * Math.sin(endRad);

  let x3 = cx + rInner * Math.cos(endRad);
  let y3 = cy + rInner * Math.sin(endRad);

  let x4 = cx + rInner * Math.cos(startRad);
  let y4 = cy + rInner * Math.sin(startRad);

  return `
    M ${x1} ${y1}
    A ${rOuter} ${rOuter} 0 0 1 ${x2} ${y2}
    L ${x3} ${y3}
    A ${rInner} ${rInner} 0 0 0 ${x4} ${y4}
    Z
  `;
}

// GIRAR
function girar() {

  let elegido = window.bolsa[Math.floor(Math.random() * window.bolsa.length)];
  let target = elegido.mid - 90;

  wheelRotation -= 200;
  svg.style.transform = `rotate(${wheelRotation}deg)`;

  ballRotation += 6 * 360 + target - wheelRotation;

  ball.style.transition = "transform 2.4s ease-out";
  ball.style.transform = `
    translate(-50%,-50%)
    rotate(${ballRotation}deg)
    translate(170px)
  `;

  resultado.innerText = "Resultado: " + elegido.num;
}
</script>

</body>
</html>
