<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

h2, h3 { text-align: center; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

/* LAYOUT PANTALLA 2 */
.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  margin-top: 20px;
}

/* RUEDA */
.wheel-container {
  width: 220px;
  height: 220px;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 4px solid #000;
}

.wheel::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 12px;
  background: black;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.slice {
  position: absolute;
  width: 50%;
  height: 50%;
  top: 50%;
  left: 50%;
  transform-origin: 0% 0%;
}

.slice span {
  position: absolute;
  top: 25%;
  left: 60%;
  transform-origin: center;
  font-size: 10px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 3px black;
}

.red { background: #c62828; }
.black { background: #000; }
.green { background: #2e7d32; }

.highlight {
  box-shadow: 0 0 8px gold, 0 0 15px gold;
}

/* PANEL DERECHO */
.panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}

</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">

  <!-- IZQUIERDA: RULETA -->
  <div class="wheel-container">
    <div id="wheel" class="wheel"></div>
  </div>

  <!-- DERECHA: CONTROLES -->
  <div class="panel">
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="0" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {
  wheel.innerHTML = '';

  let config = [];
  let suma = 0;

  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (i === 0 && count > 1) count = 1;

    if (count > 0) {
      config.push({ num: i, weight: count });
      suma += count;
    }
  }

  if (suma === 0) {
    alert('La suma no puede ser 0');
    return;
  }

  if (suma > 36) {
    alert('La suma no puede superar 36');
    return;
  }

  window.config = config;

  dibujar(config, suma);

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(config, total) {
  let currentAngle = 0;
  let toggle = false;

  config.forEach(item => {
    const angle = (item.weight / total) * 360;

    const slice = document.createElement('div');
    slice.className = 'slice';

    if (item.num === 0) {
      slice.classList.add('green');
    } else {
      toggle = !toggle;
      slice.classList.add(toggle ? 'red' : 'black');
    }

    slice.style.transform = `rotate(${currentAngle}deg) skewY(${90 - angle}deg)`;
    slice.dataset.num = item.num;

    const label = document.createElement('span');
    label.textContent = item.num;

    label.style.transform = `
      skewY(-${90 - angle}deg)
      rotate(${angle / 2}deg)
    `;

    slice.appendChild(label);
    wheel.appendChild(slice);

    currentAngle += angle;
  });
}

window.girar = function() {
  const config = window.config;

  const total = config.reduce((acc, c) => acc + c.weight, 0);
  let rand = Math.random() * total;

  let acumulado = 0;
  let result = null;

  for (let item of config) {
    acumulado += item.weight;
    if (rand <= acumulado) {
      result = item.num;
      break;
    }
  }

  document.getElementById('resultado').textContent = 'Resultado: ' + result;

  document.querySelectorAll('.slice').forEach(s => s.classList.remove('highlight'));

  document.querySelectorAll(`.slice[data-num='${result}']`).forEach(s => {
    s.classList.add('highlight');
  });
}

});
</script>

</body>
</html>
