<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta PRO</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

.wheel-wrapper {
  width: 320px;
  height: 320px;
  position: relative;
  transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 6px solid black;
  position: absolute;
}

.labels {
  position: absolute;
  width: 100%;
  height: 100%;
}

.label {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 30px;
  margin-left: -15px;
  text-align: center;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 4px black;
}

/* 🎯 BOLA */
.ball {
  position: absolute;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform-origin: center;
  box-shadow: 0 0 6px black;
  transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

table { margin:auto; }
input { width: 60px; }
</style>
</head>

<body>

<div id="pantalla1">
<h2 style="text-align:center">Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<div id="pantalla2" class="hidden">
<h2 style="text-align:center">Ruleta</h2>

<div class="layout">
  <div class="wheel-wrapper" id="wrapper">
    <div id="wheel" class="wheel"></div>
    <div id="labels" class="labels"></div>
    <div id="ball" class="ball"></div>
  </div>

  <div>
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>
</div>

</div>

<script>
const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');
const labels = document.getElementById('labels');
const wrapper = document.getElementById('wrapper');
const ball = document.getElementById('ball');

let currentRotation = 0;

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" value="1" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

function generar() {

  labels.innerHTML = "";
  let bloques = [];

  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (i === 0) count = 1;

    if (count > 0) {
      bloques.push({ num: i, size: count });
    }
  }

  let otros = bloques.filter(b => b.num !== 0);
  otros.sort(() => Math.random() - 0.5);

  bloques = [{num:0,size:1}, ...otros];

  window.bloques = bloques;

  dibujar(bloques);

  // bolsa
  window.bolsa = [];
  bloques.forEach(b => {
    for (let i=0;i<b.size;i++) {
      window.bolsa.push(b.num);
    }
  });

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(bloques) {

  let total = bloques.reduce((a,b)=>a+b.size,0);
  let current = 0;
  let gradient = "";
  let toggle = true;

  bloques.forEach(b => {

    let angle = (b.size / total) * 360;

    let color;

    if (b.num === 0) {
      color = "#2e7d32";
      toggle = true;
    } else {
      color = toggle ? "#c62828" : "#000";
      toggle = !toggle;
    }

    gradient += `${color} ${current}deg ${current + angle}deg,`;

    let mid = current + angle / 2;

    let label = document.createElement("div");
    label.className = "label";
    label.textContent = b.num;

    label.style.transform = `
      rotate(${mid - 90}deg)
      translate(130px)
      rotate(${90 - mid}deg)
    `;

    labels.appendChild(label);

    b.midAngle = mid;

    current += angle;
  });

  wheel.style.background = `conic-gradient(${gradient.slice(0,-1)})`;
}

// 🎡 GIRO CON BOLA
function girar() {

  let bolsa = window.bolsa;
  let bloques = window.bloques;

  let result = bolsa[Math.floor(Math.random() * bolsa.length)];

  let ganador = bloques.find(b => b.num === result);

  // 🎯 Ángulo exacto del número
  let targetAngle = ganador.midAngle;

  // 🎡 GIRO DE RULETA (más rápido)
  let vueltas = 6;
  let rotacionFinal = currentRotation + (vueltas * 360) + (360 - targetAngle);

  // aplicar rotación
  wrapper.style.transform = `rotate(${rotacionFinal}deg)`;

  // guardar estado
  currentRotation = rotacionFinal % 360;

  // 🟢 RESET bola (CLAVE)
  ball.style.transition = "none";
  ball.style.transform = "rotate(0deg) translate(145px)";

  // forzar reflow
  ball.offsetHeight;

  // 🎯 GIRO BOLA (contrario y preciso)
  ball.style.transition = "transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1)";

  let ballVueltas = 8;
  let ballFinal = (ballVueltas * 360) + targetAngle;

  ball.style.transform = `
    rotate(${ballFinal}deg)
    translate(145px)
  `;

  document.getElementById('resultado').innerText = "Resultado: " + result;
}
</script>

</body>
</html>
