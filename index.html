 labels.appendChild(label);
  });
}<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

h2, h3 { text-align: center; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

.wheel-wrapper {
  width: 320px;
  height: 320px;
  position: relative;
  transition: transform 4s ease-out;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 6px solid black;
  position: absolute;
}

.labels {
  position: absolute;
  width: 100%;
  height: 100%;
}

.label {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 24px;
  margin-left: -12px;
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 4px black;
  transform-origin: center;
}

.panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">

  <div class="wheel-wrapper" id="wheelWrapper">
    <div id="wheel" class="wheel"></div>
    <div id="labels" class="labels"></div>
  </div>

  <div class="panel">
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');
const labels = document.getElementById('labels');
const wrapper = document.getElementById('wheelWrapper');

let currentRotation = 0;

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="1" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {

  let otros = [];

  for (let i = 1; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;
    for (let j = 0; j < count; j++) {
      otros.push(i);
    }
  }

  otros.sort(() => Math.random() - 0.5);

  // 🔥 0 SIEMPRE PRIMERO
  let numeros = [0, ...otros.slice(0, 36)];

  window.numeros = numeros;

  dibujar(numeros);

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(numeros) {

  const total = 37;
  const angle = 360 / total;

  let gradient = "";
  let toggle = true;

  numeros.forEach((num, i) => {

    let color;

    if (num === 0) {
      color = "#2e7d32";
      toggle = true;
    } else {
      color = toggle ? "#c62828" : "#000";
      toggle = !toggle;
    }

    gradient += `${color} ${i * angle}deg ${(i + 1) * angle}deg,`;
  });

  // 🔥 MISMO ORIGEN PARA TODO
  wheel.style.background = `conic-gradient(from -90deg, ${gradient.slice(0, -1)})`;

  labels.innerHTML = "";

  const radius = 135;

  numeros.forEach((num, i) => {

    // 🔥 EXACTAMENTE EL MISMO ANGULO QUE EL GRADIENT
    const midAngle = (-90) + (i * angle) + (angle / 2);

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = num;

    label.style.transform = `
      rotate(${midAngle}deg)
      translate(${radius}px)
      rotate(-${midAngle}deg)
    `;

   

// GIRO
window.girar = function() {

  const numeros = window.numeros;
  const result = numeros[Math.floor(Math.random() * numeros.length)];

  const vueltas = 5;
  const extra = Math.random() * 360;

  currentRotation += vueltas * 360 + extra;

  wrapper.style.transform = `rotate(${currentRotation}deg)`;

  document.getElementById('resultado').textContent = 'Resultado: ' + result;
}

});
</script>

</body>
</html>
