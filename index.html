<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

h2, h3 { text-align: center; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

.wheel-container {
  width: 220px;
  height: 220px;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 4px solid black;
}

.wheel::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  background: black;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">

  <div class="wheel-container">
    <div id="wheel" class="wheel"></div>
  </div>

  <div class="panel">
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');

// TABLA (todos a 1)
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="1" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {
  wheel.innerHTML = '';

  let config = [];
  let suma = 0;

  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (i === 0 && count > 1) count = 1;

    if (count > 0) {
      config.push({ num: i, weight: count });
      suma += count;
    }
  }

  if (suma === 0) {
    alert('La suma no puede ser 0');
    return;
  }

  if (suma > 37) {
    alert('La suma no puede superar 37');
    return;
  }

  // Ordenar con 0 primero
  config.sort((a, b) => {
    if (a.num === 0) return -1;
    if (b.num === 0) return 1;
    return a.num - b.num;
  });

  window.config = config;

  dibujar(config, suma);

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

// 🎡 DIBUJAR PERFECTO (CORREGIDO)
function dibujar(config, total) {

  let gradientParts = [];
  let toggle = true;

  config.forEach(item => {
    let percent = (item.weight / total) * 100;
    let color;

    if (item.num === 0) {
      color = "#2e7d32";
      toggle = true;
    } else {
      color = toggle ? "#c62828" : "#000";
      toggle = !toggle;
    }

    gradientParts.push({ color, percent, num: item.num, weight: item.weight });
  });

  let currentPercent = 0;
  let gradient = "";

  gradientParts.forEach(part => {
    gradient += `${part.color} ${currentPercent}% ${currentPercent + part.percent}%,`;
    currentPercent += part.percent;
  });

  gradient = gradient.slice(0, -1);

  wheel.style.background = `conic-gradient(${gradient})`;

  wheel.innerHTML = "";

  let currentAngle = 0;

  const radius = wheel.offsetWidth / 2;
  const centerX = radius;
  const centerY = radius;

  gradientParts.forEach(part => {

    const angle = (part.weight / total) * 360;
    const midAngle = currentAngle + angle / 2;
    const rad = (midAngle - 90) * Math.PI / 180;

    const r = radius * 0.65;

    const x = centerX + r * Math.cos(rad);
    const y = centerY + r * Math.sin(rad);

    const label = document.createElement("div");
    label.textContent = part.num;

    label.style.position = "absolute";
    label.style.left = x + "px";
    label.style.top = y + "px";

    label.style.transform = `
      translate(-50%, -50%)
      rotate(${midAngle}deg)
    `;

    label.style.fontSize = "11px";
    label.style.color = "white";
    label.style.fontWeight = "bold";
    label.style.textShadow = "0 0 3px black";

    wheel.appendChild(label);

    currentAngle += angle;
  });
}

// 🎯 GIRAR
window.girar = function() {
  const config = window.config;

  const total = config.reduce((acc, c) => acc + c.weight, 0);
  let rand = Math.random() * total;

  let acumulado = 0;
  let result = null;

  for (let item of config) {
    acumulado += item.weight;
    if (rand <= acumulado) {
      result = item.num;
      break;
    }
  }

  document.getElementById('resultado').textContent = 'Resultado: ' + result;
}

});
</script>

</body>
</html>
