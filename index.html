<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Profesional</title>

<style>
body { font-family: Arial; }
.hidden { display: none; }

h2, h3 { text-align: center; }

table { border-collapse: collapse; margin: 20px auto; }
td, th { border: 1px solid #ccc; padding: 5px 10px; }
input { width: 60px; }

/* LAYOUT */
.layout {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

/* RULETA */
.wheel-container {
  width: 260px;
  height: 260px;
  position: relative;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 4px solid black;
  position: absolute;
  top: 0;
  left: 0;
}

/* CAPA DE NÚMEROS */
.labels {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* NÚMEROS */
.label {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: center;
  font-size: 12px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 3px black;
}

.panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="pantalla1">
<h2>Configuración</h2>
<table id="tabla"></table>
<div style="text-align:center">
<button onclick="generar()">Generar Ruleta</button>
</div>
</div>

<div id="pantalla2" class="hidden">
<h2>Ruleta</h2>

<div class="layout">

  <div class="wheel-container">
    <div id="wheel" class="wheel"></div>
    <div id="labels" class="labels"></div>
  </div>

  <div class="panel">
    <button onclick="girar()">Girar</button>
    <h3 id="resultado"></h3>
  </div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tabla = document.getElementById('tabla');
const wheel = document.getElementById('wheel');
const labels = document.getElementById('labels');

// TABLA
for (let i = 0; i <= 36; i++) {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td>${i}</td>
    <td><input type="number" min="0" value="1" id="n-${i}"></td>
  `;
  tabla.appendChild(row);
}

window.generar = function() {

  let numeros = [];

  for (let i = 0; i <= 36; i++) {
    let count = parseInt(document.getElementById(`n-${i}`).value) || 0;

    if (i === 0 && count > 1) count = 1;

    for (let j = 0; j < count; j++) {
      numeros.push(i);
    }
  }

  if (numeros.length === 0) {
    alert("No hay números");
    return;
  }

  while (numeros.length < 37) {
    numeros = numeros.concat(numeros);
  }

  numeros = numeros.slice(0, 37);

  // 0 fijo + resto aleatorio
  const otros = numeros.filter(n => n !== 0);
  otros.sort(() => Math.random() - 0.5);

  numeros = [0, ...otros.slice(0, 36)];

  dibujar(numeros);

  window.numeros = numeros;

  document.getElementById('pantalla1').classList.add('hidden');
  document.getElementById('pantalla2').classList.remove('hidden');
}

function dibujar(numeros) {

  const total = numeros.length;
  const angle = 360 / total;

  let gradient = "";
  let toggle = true;

  numeros.forEach((num, i) => {

    let color;

    if (num === 0) {
      color = "#2e7d32";
      toggle = true;
    } else {
      color = toggle ? "#c62828" : "#000";
      toggle = !toggle;
    }

    gradient += `${color} ${i * angle}deg ${(i + 1) * angle}deg,`;
  });

  gradient = gradient.slice(0, -1);

  wheel.style.background = `conic-gradient(${gradient})`;

  // LIMPIAR NÚMEROS
  labels.innerHTML = "";

  const radius = wheel.offsetWidth / 2;
  const r = radius * 0.75;

  numeros.forEach((num, i) => {

    const midAngle = (i * angle) + angle / 2;
    const rad = (midAngle - 90) * Math.PI / 180;

    const x = radius + r * Math.cos(rad);
    const y = radius + r * Math.sin(rad);

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = num;

    label.style.left = x + "px";
    label.style.top = y + "px";

    label.style.transform = "translate(-50%, -50%)";

    labels.appendChild(label);
  });
}

window.girar = function() {
  const numeros = window.numeros;
  const result = numeros[Math.floor(Math.random() * numeros.length)];
  document.getElementById('resultado').textContent = 'Resultado: ' + result;
}

});
</script>

</body>
</html>
